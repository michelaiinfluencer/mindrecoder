<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorizing... | MindRecoder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Assets/Logo/mrLogo.png" type="image/png">
    <style>
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
        }
        
        #status {
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent-blue);
            font-size: 0.9rem;
            margin-top: 20px;
            height: 1.2rem;
        }

        .node-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 40px;
        }

        .ring {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top: 2px solid var(--accent-blue);
            border-radius: 50%;
            animation: rotate 2s linear infinite;
        }

        .ring-2 {
            inset: 15px;
            border-bottom: 2px solid var(--accent-blue);
            animation: rotate 1.5s linear reverse infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body style="overflow: hidden;">
    <div class="scanline"></div>
    
    <div class="centered-container">
        <div class="loader-container">
            <div class="node-container">
                <div class="ring"></div>
                <div class="ring-2"></div>
                <img src="Assets/Logo/mrLogo.png" alt="MindRecoder" style="width: 60px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
            </div>
            
            <h2 class="gradient-text" style="letter-spacing: 4px; font-size: 1.2rem;">NEURAL AUTHORIZATION</h2>
            <div id="status">Syncing synapses...</div>
            
            <div style="width: 250px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 30px auto; overflow: hidden;">
                <div id="progress" style="width: 0%; height: 100%; background: var(--accent-blue); transition: width 0.1s linear; box-shadow: 0 0 10px var(--accent-blue);"></div>
            </div>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const progressEl = document.getElementById('progress');
        const messages = [
            "Accessing synaptic database...",
            "Decrypting neural patterns...",
            "Scanning for delta waves...",
            "Authenticating user signature...",
            "Stabilizing frequency output...",
            "Access Granted. Welcome."
        ];

        let i = 0;
        let progress = 0;

        const interval = setInterval(() => {
            progress += 1.5;
            progressEl.style.width = progress + '%';

            if (progress % 20 < 1.5 && i < messages.length - 1) {
                statusEl.innerText = messages[i];
                i++;
            }

            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    window.location.href = 'app.html';
                }, 500);
            }
        }, 50);
    </script>
</body>
</html>
