<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Dashboard | MindRecoder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Assets/Logo/mrLogo.png" type="image/png">
    <style>
        /* Custom Player Styles */
        .player-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 20px 5%;
            background: rgba(13, 20, 31, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2000;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        .player-bar.active {
            transform: translateY(0);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 300px;
        }

        .player-info img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .player-btns {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .progress-wrapper {
            width: 100%;
            max-width: 600px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-blue);
            width: 0%;
            border-radius: 2px;
        }

        .logout-btn {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .logout-btn:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="scrolled">
        <div class="logo-container">
            <img src="Assets/Logo/mrLogo.png" alt="Logo">
            <span class="logo-text">MindRecoder</span>
        </div>
        <div style="display: flex; align-items: center; gap: 30px;">
            <span style="color: var(--accent-blue); font-size: 0.9rem;">Node: Alpha-101 (Active)</span>
            <a href="index.html" class="logout-btn">Terminate Session</a>
        </div>
    </nav>

    <header class="dashboard-header">
        <h1 style="margin-bottom: 10px;">Neural <span class="gradient-text">Library</span></h1>
        <p style="color: var(--text-secondary);">Select a frequency program to begin re-coding.</p>
    </header>

    <main class="product-grid" id="mainGrid">
        <!-- Cards will be generated by JS for cleaner code but I'll write them here for immediate visibility as requested -->
    </main>

    <script>
        const programs = [
            { id: 1, title: "Stress Decimation 01", desc: "Erase cortisol spikes and recalibrate your nervous system for total composure.", asset: "Assets/Audio/mr1.mp3", img: "Assets/Images/mrimg1.png", dur: "15:00" },
            { id: 2, title: "Sovereign Mind", desc: "Develop an unshakeable inner frame. Block external validation loops.", asset: "Assets/Audio/mr1.mp3", img: "Assets/Logo/mrLogo.png", dur: "12:30" },
            { id: 3, title: "Executive Order", desc: "Advanced organization protocols. Hard-code tactical planning and excellence.", asset: "Assets/Audio/mr1.mp3", img: "Assets/Images/mrimg1.png", dur: "20:00" },
            { id: 4, title: "Rapid Recall", desc: "Enhance synaptic pathways for near-instant memory retrieval and pattern recognition.", asset: "Assets/Audio/mr1.mp3", img: "Assets/Logo/mrLogo.png", dur: "18:45" },
            { id: 5, title: "Infinite Drive", desc: "Fuel your internal engine. Replace procrastination with relentless forward motion.", asset: "Assets/Audio/mr1.mp3", img: "Assets/Images/mrimg1.png", dur: "45:00" },
            { id: 6, title: "Emotional Stoicism", desc: "Construct a logical barrier against emotional volatility and reactive behavior.", asset: "Assets/Audio/mr1.mp3", img: "Assets/Logo/mrLogo.png", dur: "10:00" },
            { id: 7, title: "Creative Flow", desc: "Bypass the inner critic and access the deep subconscious well of innovation.", asset: "Assets/Audio/mr1.mp3", img: "Assets/Images/mrimg1.png", dur: "30:00" },
            { id: 8, title: "Social Dominance", desc: "Subconscious cues for presence, authority, and charismatic influence.", asset: "Assets/Audio/mr1.mp3", img: "Assets/Logo/mrLogo.png", dur: "15:15" },
            { id: 9, title: "Sleep Architect", desc: "The ultimate shutdown sequence. Deep REM recovery for peak mental restoration.", asset: "Assets/Audio/mr1.mp3", img: "Assets/Images/mrimg1.png", dur: "60:00" },
            { id: 10, title: "Fear Dissolution", desc: "Systematically dismantle phobias and hesitation protocols in real-time.", asset: "Assets/Audio/mr1.mp3", img: "Assets/Logo/mrLogo.png", dur: "22:20" },
            { id: 11, title: "Peak Physicality", desc: "Neuro-muscular synchronization for enhanced mind-muscle connection and performance.", asset: "Assets/Audio/mr1.mp3", img: "Assets/Images/mrimg1.png", dur: "30:00" },
            { id: 12, title: "Transcendent Logic", desc: "Tier 4 access: Pure algorithmic thinking for complex problem solving.", asset: "Assets/Audio/mr1.mp3", img: "Assets/Logo/mrLogo.png", dur: "55:00" }
        ];

        const grid = document.getElementById('mainGrid');
        
        programs.forEach(p => {
            const card = document.createElement('article');
            card.className = 'product-card glass';
            card.innerHTML = `
                <div class="product-img">
                    <img src="${p.img}" alt="${p.title}" style="filter: brightness(0.7);">
                </div>
                <div class="product-info">
                    <h3>${p.title}</h3>
                    <p>${p.desc}</p>
                </div>
                <div class="audio-controls">
                    <button class="play-btn" onclick="playAudio('${p.title}', '${p.asset}', '${p.img}')">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <div style="flex: 1;">
                        <span style="display: block; font-size: 0.8rem; color: var(--text-secondary);">Session Length: ${p.dur}</span>
                        <button onclick="forceDownload('${p.asset}', '${p.title}.mp3')" class="download-link" style="background:none; border:none; padding:0; cursor:pointer;">Download MP3</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        function forceDownload(url, filename) {
            fetch(url)
                .then(response => response.blob())
                .then(blob => {
                    const link = document.createElement('a');
                    link.href = window.URL.createObjectURL(blob);
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                })
                .catch(err => {
                    console.error('Download failed:', err);
                    // Fallback to simple link if fetch fails (e.g. CORS)
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = filename;
                    link.click();
                });
        }
    </script>

    <!-- Global Player -->
    <div id="playerBar" class="player-bar">
        <div class="player-info">
            <img id="p-img" src="Assets/Images/mrimg1.png" alt="Current">
            <div>
                <div id="p-title" style="font-weight: 700;">Program Title</div>
                <div style="font-size: 0.8rem; color: var(--text-secondary);">MindRecoder Sessions</div>
            </div>
        </div>
        <div class="player-controls">
            <div class="player-btns">
                <button onclick="togglePlay()" id="playBtn" class="play-btn" style="width: 40px; height: 40px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </button>
            </div>
            <div class="progress-wrapper" onclick="seek(event)">
                <div id="p-progress" class="progress-fill"></div>
            </div>
        </div>
        <div style="width: 300px; display: flex; justify-content: flex-end;">
            <span id="p-time" style="font-size: 0.8rem; font-family: monospace;">0:00 / 0:00</span>
        </div>
    </div>

    <audio id="mainAudio" style="display: none;"></audio>

    <script>
        const audio = document.getElementById('mainAudio');
        const playerBar = document.getElementById('playerBar');
        const pTitle = document.getElementById('p-title');
        const pImg = document.getElementById('p-img');
        const pProgress = document.getElementById('p-progress');
        const pTime = document.getElementById('p-time');
        const playBtn = document.getElementById('playBtn');

        function playAudio(title, src, img) {
            if (audio.src.includes(src)) {
                togglePlay();
                return;
            }
            
            audio.src = src;
            pTitle.innerText = title;
            pImg.src = img;
            playerBar.classList.add('active');
            audio.play();
            updatePlayBtn(true);
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                updatePlayBtn(true);
            } else {
                audio.pause();
                updatePlayBtn(false);
            }
        }

        function updatePlayBtn(isPlaying) {
            playBtn.innerHTML = isPlaying 
                ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'
                : '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
        }

        audio.ontimeupdate = () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            pProgress.style.width = percent + '%';
            
            const cur = formatTime(audio.currentTime);
            const dur = formatTime(audio.duration || 0);
            pTime.innerText = `${cur} / ${dur}`;
        };

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function seek(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percent = x / rect.width;
            audio.currentTime = percent * audio.duration;
        }
    </script>
</body>
</html>
